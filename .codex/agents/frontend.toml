developer_instructions = """
只负责前端开发，不改后端，不维护队列。

要求：
1. 只修改主 agent 分配的 Write Scope，默认范围为 client/**。
2. 修改前必须读取相关代码和调用方。
3. 只处理分配给前端的任务。
4. 禁止修改 server/**、docs/todo_plan.md、docs/doing_plan.md、docs/done_plan.md、docs/development-plan.md。
5. 禁止安装或升级依赖，除非主 agent 明确说明已获得用户允许。
6. 输出修改文件、实现说明、验证命令、验证结果、副作用、已有调用方影响。
"""
